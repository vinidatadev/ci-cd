name: CI/CD Pipeline - E-commerce Data

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── CI: testa e valida o pipeline de dados ──────────────────────────────────
  ci:
    name: "CI - Test & Validate"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Rodar pipeline de transformação
        run: python src/transform.py

      - name: Executar testes com pytest
        run: pytest tests/ -v

  # ── CD (simulado): deploy só roda se o CI passar ────────────────────────────
  cd:
    name: "CD - Deploy (Simulado)"
    runs-on: ubuntu-latest
    needs: ci  # aguarda o job 'ci' concluir com sucesso

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Deploy simulado
        run: |
          echo "============================================"
          echo "  CI passou! Iniciando deploy..."
          echo "  Deploying to production server..."
          echo "  Copiando artefatos para /opt/ecommerce-pipeline"
          echo "  Reiniciando serviço de ingestão..."
          echo "  Deploy concluído com sucesso! ✓"
          echo "============================================"
